---
name: CI

on:
  workflow_call:
    inputs:
      java_version:
        description: Java version to use for running Sonar and publishing docs & artifacts
        type: string
        required: false
        default: 17
      java_test_versions:
        description: Java versions to use for testing the project
        type: string
        required: false
        default: '[11, 25]'
      publish_snapshots:
        description: Whether to attempt publishing snapshots. When false, the workflow will only run build.
        type: boolean
        default: true
        required: false
      pages:
        description: Path expression for GitHub pages to upload.
        type: string
        required: false
      sonar_project_key:
        description: The project key to be passed to Sonar
        type: string
        required: false
      sonar_host_url:
        description: The host URL of the Sonar server (optional, defaults to https://sonar-dev.jqassistant.org/sonar/)
        type: string
        required: false
        default: 'https://sonar-dev.jqassistant.org/sonar/'
      sonar_organization:
        description: The organization to be passed to SonarCloud (optional, defaults to github organization)
        type: string
        required: false
        default: '${{github.repository_owner}}'
    secrets:
      ossrh_username:
        required: true
      ossrh_password:
        required: true
      ossrh_signing_key:
        required: false
      ossrh_signing_password:
        required: false
      sonar_token:
        required: true
      confluence_username:
        required: false
      confluence_password:
        required: false

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build with java ${{ matrix.java_version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java_version: ${{ fromJson(inputs.java_test_versions) }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java_version }}
          cache: 'maven'
      - uses: s4u/maven-settings-action@v3.0.0
        with:
          sonatypeSnapshots: true
#          servers: |
#            [{
#              "id": "confluence",
#              "username": "${{ secrets.confluence_username }}",
#              "password": "${{ secrets.confluence_password }}"
 #           }]
      - name: Build and test with Java ${{ matrix.java_version }}
        run: mvn --batch-mode --update-snapshots -P IT install
        env:
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_PASSWORD: ${{ secrets.CONFLUENCE_PASSWORD }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: contains(fromJSON('["buschmais", "jqassistant-plugin", "jqassistant-tooling", "jQAssistant"]'), github.repository_owner) && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}
          cache: 'maven'
      - uses: s4u/maven-settings-action@v3.0.0
        with:
          sonatypeSnapshots: true
          servers: |
            [{
              "id": "sonatype-nexus-snapshots",
              "username": "${{ secrets.OSSRH_USERNAME }}",
              "password": "${{ secrets.OSSRH_PASSWORD }}"
            },{
              "id": "confluence",
              "username": "username",
              "password": "password"
            }]
      - name: publish-snapshots
        run: | 
          if [[ '${{ secrets.CONFLUENCE_USERNAME }}' != '' &&  '${{ secrets.CONFLUENCE_PASSWORD }}' != '']]; then
            mvn deploy --batch-mode -DskipTests -Dconfluence.convertOnly=false -Dconfluence.username=${{secrets.CONFLUENCE_USERNAME}} -Dconfluence.password=${{secrets.CONFLUENCE_PASSOWRD}}
          fi

      - name: Execute Sonarqube analysis
        run: |
          if [[ ${{ github.actor != 'dependabot[bot]' }} = "true" && '${{inputs.sonar_project_key }}' != '' ]]; then
            mvn --batch-mode sonar:sonar -Dsonar.host.url=${{inputs.sonar_host_url}} -Dsonar.projectKey=${{inputs.sonar_project_key}} -Dsonar.organization=${{inputs.sonar_organization}}
          fi
        env:
          SONAR_TOKEN: ${{ secrets.sonar_token }}

      - name: Deploy GitHub Pages to snapshot
        if: ${{ inputs.pages != '' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ inputs.pages }}
          destination_dir: ./snapshot

      - name: Deploy GitHub Pages to arc42
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: "./arc42/target/generated-docs/"
          destination_dir: "./arc42/"

      - name: Deploy GitHub Pages to report
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: "./target/jqassistant/"
          exclude_assets: "store/**"
          destination_dir: "./report/"